<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: Arial;
}

body {
  background: #0f172a;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 🔷 Top Header */
.header {
  background: #020617;
  padding: 15px;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: #38bdf8;
  border-bottom: 1px solid #334155;
}

/* 🔷 Center Box */
.wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.container {
  background: #1e293b;
  padding: 30px;
  border-radius: 10px;
  width: 320px;
  text-align: center;
}

/* 🔷 Same Size Inputs */
input, select {
  width: 100%;
  height: 42px;
  padding: 10px;
  margin: 10px 0;
  border: none;
  border-radius: 5px;
  outline: none;
}

/* 🔷 Button */
button {
  width: 100%;
  height: 42px;
  background: #38bdf8;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  font-weight: bold;
}

/* 🔷 Links */
a {
  color: #38bdf8;
  display: block;
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- 🔷 Header -->
<div class="header">
  My Login System
</div>

<div class="wrapper">
  <div class="container">
    <h2>Login</h2>

    <select id="role">
      <option value="admin">Admin</option>
      <option value="customer">Customer</option>
    </select>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <a href="for.html">Forgot Password?</a>
    <a href="sig.html">Create Account</a>
  </div>
</div>

<script>
function login() {
  let role = document.getElementById("role").value;
  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user === "" || pass === ""){
    alert("Please fill all fields");
    return;
  }

  if(role === "admin"){
    window.location.href = "admin.html";
  } else {
    window.location.href = "customer.html";
  }
}
</script>

</body>
</html>
