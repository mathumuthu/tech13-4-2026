<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 120px;
      color: #38bdf8;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      color: #cbd5f5;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      padding: 12px 25px;
      background: #38bdf8;
      color: #000;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.3s;
    }

    a:hover {
      background: #0ea5e9;
      color: #fff;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Oops! The page you're looking for doesn't exist.</p>
    <a href="index.html">Go Home</a>
  </div>

</body>
</html>
